# EP Daily Scanner — GitHub Actions
#
# Job 1 — Manhã 07:00 Lisboa (Verão UTC+1)
#   Polygon EOD + Claude + publica GitHub Pages
#
# Job 2 — Tarde 16:00 Lisboa (Verão UTC+1)
#   yfinance intraday PRIME + publica GitHub Pages
#
# Horários de inverno (Out-Mar, UTC+0):
#   Manhã:  '0 7  * * 1-5'
#   Tarde:  '0 16 * * 1-5'

name: EP Daily Scanner

on:
  schedule:
    - cron: '0 6  * * 1-5'   # 07:00 Lisboa (Verão)
    - cron: '0 15 * * 1-5'   # 16:00 Lisboa (Verão)
  workflow_dispatch:

jobs:

  # ── Job 1: Scan da manhã ─────────────────────────────────────────────────────
  scan-morning:
    name: Scan Manha (EOD)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Scan EOD + Claude
        env:
          POLYGON_API_KEY:    ${{ secrets.POLYGON_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING:   utf-8
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          python ep_daily_runner.py \
            --min-gap 20.0 \
            --min-vol-ratio 10.0 \
            --min-score 50 \
            --max-candidates 5 \
            --output-json results.json

      - name: Gerar relatório HTML
        run: python ep_report_generator.py --input results.json --output docs/index.html

      - name: Publicar GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false

      - name: Guardar cache closes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prev-closes-${{ github.run_id }}
          path: ep_prev_closes.json
          retention-days: 1

      - name: Guardar resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-morning-${{ github.run_id }}
          path: results.json
          retention-days: 30

  # ── Job 2: Scan da tarde ─────────────────────────────────────────────────────
  scan-afternoon:
    name: Scan Tarde (Intraday PRIME)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Download cache closes
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: prev-closes-*
          merge-multiple: true

      - name: Scan intraday PRIME
        env:
          POLYGON_API_KEY:    ${{ secrets.POLYGON_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING:   utf-8
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          python ep_intraday_scanner.py \
            --min-gap 15.0 \
            --min-vol-ratio 5.0
          # Gerar results.json para o relatório
          echo '{"scan_type":"INTRADAY_PRIME","candidates":[],"canslim":[]}' > results.json 2>/dev/null || true

      - name: Gerar relatório HTML (intraday)
        run: python ep_report_generator.py --input results.json --output docs/index.html

      - name: Publicar GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false

      - name: Guardar resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-afternoon-${{ github.run_id }}
          path: results.json
          retention-days: 30
